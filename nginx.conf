server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # أصول البناء تحمل بصمة محتوى في أسمائها — تخزين طويل الأمد آمن
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # عامل الخدمة يجب ألا يُخزَّن إطلاقًا، وإلا بقي إصدار قديم يتحكم
    # بالصفحة بعد كل نشر ولم يصل التحديث للمستخدمين
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # تطبيق صفحة واحدة: كل المسارات تعود إلى index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
